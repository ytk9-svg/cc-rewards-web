<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Card Rewards — which card to use</title>
<style>
  :root{
    --bg:#eef1f6; --surface:#ffffff; --surface2:#f6f8fb;
    --ink:#192233; --muted:#5d6878; --line:#e2e7ef;
    --emerald:#0e8a63; --emerald-soft:#e6f4ee;
    --gold:#b8860b; --gold-soft:#fbf2da;
    --amber:#b4690e; --blue:#2f6df0;
    --radius:14px; --shadow:0 1px 2px rgba(20,30,50,.06),0 6px 20px rgba(20,30,50,.06);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.55 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","PingFang HK","Microsoft JhengHei",sans-serif}
  .tnum{font-variant-numeric:tabular-nums}
  .wrap{max-width:720px;margin:0 auto;padding:0 16px 64px}

  header{position:sticky;top:0;z-index:5;background:rgba(238,241,246,.85);backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--line);margin:0 -16px 18px;padding:14px 16px}
  .bar{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:baseline;gap:9px;min-width:0}
  .brand .logo{font-size:1.15rem}
  .brand h1{font-size:1.06rem;font-weight:680;margin:0;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lang{flex:none;display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface)}
  .lang button{appearance:none;border:0;background:transparent;color:var(--muted);font-size:.82rem;font-weight:600;padding:7px 12px;cursor:pointer}
  .lang button.on{background:var(--ink);color:#fff}

  .sub{color:var(--muted);font-size:.84rem;margin:-6px 0 16px}
  .tabs{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:16px}
  .tabs button{flex:1;appearance:none;border:0;background:transparent;color:var(--muted);font-size:.9rem;font-weight:600;padding:9px 8px;border-radius:999px;cursor:pointer}
  .tabs button.on{background:var(--emerald);color:#fff}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  label{display:block;font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:0 0 5px;font-weight:600}
  select,input{width:100%;background:var(--surface2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:1rem;font-family:inherit}
  select:focus,input:focus{outline:2px solid var(--blue);outline-offset:1px;border-color:var(--blue)}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:11px}
  .mile{display:flex;align-items:center;gap:8px;margin-top:13px;font-size:.82rem;color:var(--muted);flex-wrap:wrap}
  .mile input{width:84px;text-align:right}

  .res{display:flex;flex-direction:column;gap:10px;margin-top:2px}
  .row{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:13px 15px;transition:opacity .15s}
  .row.best{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-soft),var(--shadow)}
  .row.muted{opacity:.62}
  .row .head{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .row .name{font-weight:660;letter-spacing:-.01em}
  .row .val{font-weight:760;font-size:1.12rem;white-space:nowrap}
  .row .val.cash{color:var(--emerald)} .row .val.miles{color:var(--blue)} .row .val.off{color:var(--muted)}
  .row .net{font-size:.76rem;color:var(--muted);margin-top:3px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .chip{font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
  .chip.best{background:var(--gold);border-color:var(--gold);color:#fff}
  .chip.warn{background:#fff;border-color:var(--amber);color:var(--amber)}
  .chip.good{background:var(--emerald-soft);border-color:#bfe3d3;color:var(--emerald)}
  .detail{font-size:.82rem;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
  .detail b{color:var(--ink);font-weight:640}
  .others{font-size:.82rem;color:var(--muted);background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);padding:13px 15px}
  .others b{color:var(--ink)}
  .note{font-size:.74rem;color:#7a8493;margin-top:12px;line-height:1.5}

  /* cheat-sheet */
  .cs{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:6px 15px}
  .cs .card{padding:14px 0;border-top:1px solid var(--line)}
  .cs .card:first-child{border-top:0}
  .cs h3{margin:0;font-size:1rem;font-weight:660}
  .cs .iss{font-size:.74rem;color:var(--muted);margin:2px 0 8px}
  .cs .r{display:flex;justify-content:space-between;gap:12px;font-size:.86rem;padding:3px 0}
  .cs .r .c{color:var(--muted)} .cs .r .rt{font-weight:680;white-space:nowrap}

  /* month tracker */
  .trk .it{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .trk .it:first-child{border-top:0}
  .trk .it .nm{flex:1;min-width:0}
  .trk .it .nm .t{font-weight:620;font-size:.95rem}
  .trk .it .nm .g{font-size:.74rem;color:var(--muted)}
  .trk .it input{width:120px;text-align:right}
  .bar2{height:6px;border-radius:99px;background:var(--line);margin-top:6px;overflow:hidden}
  .bar2 span{display:block;height:100%;background:var(--emerald)}
  .bar2 span.full{background:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="logo">💳</span><h1 id="appTitle"></h1></div>
    <div class="lang" role="group" aria-label="Language">
      <button id="langEn" onclick="setLang('en')">EN</button>
      <button id="langZh" onclick="setLang('zh')">繁中</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="sub" id="sub"></div>
  <div class="tabs">
    <button id="tabDecide" class="on" onclick="show('decide')"></button>
    <button id="tabSheet" onclick="show('sheet')"></button>
    <button id="tabMonth" onclick="show('month')"></button>
  </div>

  <section id="decide">
    <div class="panel">
      <div class="grid2">
        <div><label id="lblCat"></label><select id="cat"></select></div>
        <div><label id="lblAmt"></label><input id="amt" type="number" inputmode="numeric" value="500" min="0" step="50" /></div>
      </div>
      <div class="mile"><span id="lblMile"></span><span>HK$</span><input id="mv" type="number" value="0.10" min="0" step="0.01" /><span id="lblMileHint"></span></div>
    </div>
    <div class="res" id="result"></div>
    <div class="note" id="disclaimer"></div>
  </section>

  <section id="sheet" style="display:none"><div class="cs" id="sheetBody"></div></section>

  <section id="month" style="display:none">
    <div class="panel"><div id="monthIntro" class="sub" style="margin:0 0 4px"></div><div class="trk" id="trkBody"></div></div>
    <div class="note" id="monthNote"></div>
  </section>
</div>

/* ---------------- i18n ---------------- */
const I18N = {

let LANG = localStorage.getItem("lang") || "en";
const T = ()=>I18N[LANG];

/* spending categories (friendly bucket -> keywords matched against rule categories) */
const CATS = [
  {key:"dining",   en:"Dining (local)",        zh:"本地餐飲",        kw:["dining","dine","restaurant","餐"]},
  {key:"overseas", en:"Overseas / foreign",    zh:"海外／外幣簽賬",  kw:["overseas","foreign","海外","外幣","region","non-hk"]},
  {key:"online",   en:"Online shopping",       zh:"網上購物",        kw:["online","網上","网上","e-commerce"]},
  {key:"transport",en:"Public transport",      zh:"公共交通",        kw:["transport","transit","交通","mtr","bus","ferry"]},
  {key:"supermarket",en:"Supermarket / grocery",zh:"超級市場",       kw:["supermarket","grocery","超"]},
  {key:"mobile",   en:"Mobile payment",        zh:"手機支付",        kw:["mobile payment","apple pay","手機支付","quickpass","qr"]},
  {key:"entertain",en:"Online entertainment",  zh:"網上娛樂",        kw:["entertainment","娛樂","netflix","spotify","streaming"]},
  {key:"travel",   en:"Travel (hotel/airline)",zh:"旅遊（酒店／機票）",kw:["travel","旅遊","hotel","airline","酒店","機票"]},
  {key:"general",  en:"Everything else",       zh:"其他一般簽賬",    kw:[]},
];
const BASE_SUBSTR = ["其他","基本","all spending","other retail","other eligible","all other","general spend"];
const BASE_EXACT  = ["retail","local","local spend"];
const isBaseCat = c=>{c=(c||"").toLowerCase().trim(); return BASE_EXACT.includes(c)||BASE_SUBSTR.some(k=>c.includes(k));};

/* spend tracker (month-keyed localStorage) */
function monthKey(){ const d=new Date(); return "spend-"+d.getFullYear()+"-"+(d.getMonth()+1); }
let SPEND = JSON.parse(localStorage.getItem(monthKey())||"{}");
function saveSpend(){ localStorage.setItem(monthKey(), JSON.stringify(SPEND)); }

function parseRate(rate, milesValue){
  if(!rate) return null;
  const m = rate.match(/(?:HK\$?|HKD)\s*\$?\s*([\d.]+)\s*=\s*1\s*mile/i);
  if(m){ const n=parseFloat(m[1]); if(n>0) return {kind:"miles", perHKD:1/n, valuePerHKD:(1/n)*milesValue, n}; }
  const p = rate.match(/([\d.]+)\s*%/);
  if(p) return {kind:"cash", pct:parseFloat(p[1]), valuePerHKD:parseFloat(p[1])/100};
  return null;
}
function pickRule(card, cat){
  const prog=card.reward_programs[0]; if(!prog) return {rule:null,score:0,prog};
  let best=null,bs=0,bv=-1;
  for(const r of (prog.rules||[])){
    const c=(r.category||"").toLowerCase();
    let s = (cat.key!=="general" && cat.kw.some(k=>c.includes(k))) ? 2 : (isBaseCat(r.category)?1:0);
    if(s===0) continue;
    const v=(parseRate(r.rate,0.1)||{valuePerHKD:0}).valuePerHKD;
    if(s>bs||(s===bs&&v>bv)){ best=r;bs=s;bv=v; }
  }
  return {rule:best, score:bs, prog};
}
// gate status from month-to-date spend
function gate(prog, cardId, amount, valuePerHKD){
  const mtd = SPEND[cardId]||0;
  if(prog.monthly_min_spend){
    if(mtd + amount < prog.monthly_min_spend) return {status:"locked", needMore:prog.monthly_min_spend-mtd};
    if(mtd < prog.monthly_min_spend) return {status:"unlocks"};
  }
  if(prog.monthly_cap && valuePerHKD>0 && mtd*valuePerHKD >= prog.monthly_cap) return {status:"capped"};
  return {status:"ok"};
}

function compute(){
  const cat=CATS.find(c=>c.key===document.getElementById("cat").value)||CATS[0];
  const amt=Math.max(0,parseFloat(document.getElementById("amt").value)||0);
  const mv =Math.max(0,parseFloat(document.getElementById("mv").value)||0);
  localStorage.setItem("milesValue", mv);
  const rows=[], others=[];
  for(const card of CARDS){
    const pk=pickRule(card,cat);
    if(pk.rule && pk.score>=1){
      const pr=parseRate(pk.rule.rate, mv);
      const vph=pr?pr.valuePerHKD:0;
      const g=gate(pk.prog, card.id, amt, vph);
      const blocked = g.status==="locked"||g.status==="capped";
      const reward = blocked?0:vph*amt;
      rows.push({card,prog:pk.prog,rule:pk.rule,matched:pk.score>=2,pr,reward,vph,gate:g,blocked});
    } else others.push(card);
  }
  rows.sort((a,b)=> (a.blocked-b.blocked) || (b.reward-a.reward));
  render(rows, others, cat, amt, mv);
}

function flags(prog, g){
  const t=T(); const f=[];
  if(g && g.status==="unlocks") f.push(`<span class="chip good">${t.unlocks}</span>`);
  if(g && g.status==="locked")  f.push(`<span class="chip warn">${t.locked(g.needMore)}</span>`);
  if(g && g.status==="capped")  f.push(`<span class="chip warn">${t.capped}</span>`);
  if(prog.needs_registration) f.push(`<span class="chip warn">${t.reg}</span>`);
  if(prog.monthly_min_spend)  f.push(`<span class="chip">${t.min(prog.monthly_min_spend)}</span>`);
  if(prog.monthly_cap)        f.push(`<span class="chip">${t.cap(prog.monthly_cap)}</span>`);
  if(prog.promo_end)          f.push(`<span class="chip">${t.promo(prog.promo_end)}</span>`);
  if(prog.confidence&&prog.confidence!=="high") f.push(`<span class="chip warn">${t.conf(prog.confidence)}</span>`);
  return f.join("");
}
function valLabel(r){
  const t=T();
  if(r.blocked) return {txt:"—",cls:"off"};
  if(!r.pr) return {txt:"—",cls:"off"};
  if(r.pr.kind==="miles"){ const mv=parseFloat(document.getElementById("mv").value)||0.1; const mi=Math.round(r.reward/mv); return {txt:`${mi.toLocaleString()} mi · ~HK$${r.reward.toFixed(0)}`,cls:"miles"}; }
  return {txt:`HK$${r.reward.toFixed(1)} ${t.backHK}`,cls:"cash"};
}
function render(rows, others, cat, amt, mv){
  const t=T(), el=document.getElementById("result");
  const catLabel = LANG==="zh"?cat.zh:cat.en;
  let html = rows.map((r,i)=>{
    const v=valLabel(r), best=i===0&&!r.blocked&&r.reward>0;
    return `<div class="row ${best?'best':''} ${r.blocked?'muted':''}">
      <div class="head"><div class="name">${r.card.name}</div><div class="val ${v.cls} tnum">${v.txt}</div></div>
      <div class="net">${r.matched?'':'· '+t.baseRate+' '}${r.card.network} · ${r.card.issuer}</div>
      <div class="chips">${best?`<span class="chip best">${t.best}</span>`:''}${flags(r.prog,r.gate)}</div>
      <div class="detail"><b>${r.rule.category}</b> — ${r.rule.rate}${r.rule.note?'<br>'+r.rule.note:''}</div>
    </div>`;
  }).join("");
  if(!rows.length) html=`<div class="others">${t.none}</div>`;
  if(others.length) html+=`<div class="others"><b>${t.others(catLabel)}</b><br>${others.map(c=>c.name).join(" · ")}</div>`;
  el.innerHTML=html;
}

function renderSheet(){
  const t=T();
  document.getElementById("sheetBody").innerHTML = CARDS.map(card=>{
    const p=card.reward_programs[0]||{}; const rules=p.rules||[];
    return `<div class="card">
      <h3>${card.name}</h3>
      <div class="iss">${card.network} · ${card.issuer} · ${t.csType[p.reward_type]||p.reward_type||''}${p.promo_end?' · '+t.promo(p.promo_end):''}</div>
      ${rules.map(r=>`<div class="r"><span class="c">${r.category}</span><span class="rt tnum">${r.rate}</span></div>`).join("")}
      <div class="chips" style="margin-top:8px">${flags(p,null)}</div>
    </div>`;
  }).join("");
}
function renderMonth(){
  const t=T();
  document.getElementById("monthIntro").textContent=t.monthIntro;
  document.getElementById("monthNote").textContent=t.monthNote;
  const gated=CARDS.filter(c=>{const p=c.reward_programs[0]||{};return p.monthly_min_spend||p.monthly_cap;});
  document.getElementById("trkBody").innerHTML = gated.map(c=>{
    const p=c.reward_programs[0]; const mtd=SPEND[c.id]||0;
    const target=p.monthly_min_spend||0; const pct=target?Math.min(100,Math.round(mtd/target*100)):0;
    const gline=[p.monthly_min_spend?t.min(p.monthly_min_spend):null,p.monthly_cap?t.cap(p.monthly_cap):null].filter(Boolean).join(" · ");
    return `<div class="it">
      <div class="nm"><div class="t">${c.name}</div><div class="g">${gline}</div>
        ${target?`<div class="bar2"><span class="${pct>=100?'full':''}" style="width:${pct}%"></span></div>`:''}</div>
      <input type="number" inputmode="numeric" min="0" step="100" value="${mtd||''}" placeholder="0"
        oninput="SPEND['${c.id}']=parseFloat(this.value)||0;saveSpend();updateBar(this,'${c.id}');" aria-label="${t.spent}">
    </div>`;
  }).join("") || `<div class="g" style="color:var(--muted)">—</div>`;
}
function updateBar(input,id){
  const card=CARDS.find(c=>c.id===id); const p=card.reward_programs[0]; const target=p.monthly_min_spend||0;
  if(!target) return; const bar=input.closest(".it").querySelector(".bar2 span"); if(!bar) return;
  const pct=Math.min(100,Math.round(((SPEND[id]||0)/target)*100)); bar.style.width=pct+"%"; bar.className=pct>=100?"full":"";
}

function applyStaticText(){
  const t=T();
  document.documentElement.lang = LANG==="zh"?"zh-Hant":"en";
  document.getElementById("appTitle").textContent=t.title;
  document.getElementById("sub").textContent=t.sub(CARDS.length);
  document.getElementById("tabDecide").textContent=t.tDecide;
  document.getElementById("tabSheet").textContent=t.tSheet;
  document.getElementById("tabMonth").textContent=t.tMonth;
  document.getElementById("lblCat").textContent=t.lblCat;
  document.getElementById("lblAmt").textContent=t.lblAmt;
  document.getElementById("lblMile").textContent=t.lblMile;
  document.getElementById("lblMileHint").textContent=t.lblMileHint;
  document.getElementById("disclaimer").textContent=t.disc;
  document.getElementById("langEn").classList.toggle("on",LANG==="en");
  document.getElementById("langZh").classList.toggle("on",LANG==="zh");
  const sel=document.getElementById("cat"); const cur=sel.value;
  sel.innerHTML=CATS.map(c=>`<option value="${c.key}">${LANG==="zh"?c.zh:c.en}</option>`).join("");
  if(cur) sel.value=cur;
}
function setLang(l){ LANG=l; localStorage.setItem("lang",l); applyStaticText(); compute(); renderSheet(); renderMonth(); }
function show(w){
  for(const s of ["decide","sheet","month"]) document.getElementById(s).style.display = (s===w)?"":"none";
  document.getElementById("tabDecide").classList.toggle("on",w==="decide");
  document.getElementById("tabSheet").classList.toggle("on",w==="sheet");
  document.getElementById("tabMonth").classList.toggle("on",w==="month");
  if(w==="sheet") renderSheet(); if(w==="month") renderMonth();
}
function init(){
  const mv=localStorage.getItem("milesValue"); if(mv) document.getElementById("mv").value=mv;
  applyStaticText();
  ["cat","amt","mv"].forEach(id=>document.getElementById(id).addEventListener("input",compute));
  compute();
}
init();
fetch("./cards.json").then(r=>r.ok?r.json():null).then(d=>{ if(d&&Array.isArray(d.cards)&&d.cards.length){ CARDS=d.cards; SPEND=JSON.parse(localStorage.getItem(monthKey())||"{}"); applyStaticText(); compute(); } }).catch(()=>{});
